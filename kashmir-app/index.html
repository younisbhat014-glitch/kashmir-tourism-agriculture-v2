<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#074a38" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var installReadyEvent = 'kashmir:pwa-install-ready';

        window.addEventListener('beforeinstallprompt', function (event) {
          event.preventDefault();
          window.__kashmirPwaInstallPrompt = event;
          window.dispatchEvent(new Event(installReadyEvent));
        });

        if ('serviceWorker' in navigator && (window.isSecureContext || window.location.hostname === 'localhost')) {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        }
      })();
    </script>
    <title>Kashmir Valley - Tourism & Agriculture Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
